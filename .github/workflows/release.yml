name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Run PyPI publish and release asset upload"
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Run tests
        run: |
          python -m unittest discover -s tests -p 'test_*.py' -q

      - name: Build artifacts
        run: |
          python -m build

      - name: Validate artifacts
        run: |
          python -m twine check dist/*

      - name: Publish to PyPI (trusted)
        id: publish_trusted
        continue-on-error: true
        if: ${{ github.event_name == 'push' || github.event.inputs.publish == 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Publish to PyPI (API token fallback)
        id: publish_api
        if: ${{ (github.event_name == 'push' || github.event.inputs.publish == 'true') && steps.publish_trusted.outcome == 'failure' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "${TWINE_PASSWORD}" ]; then
            echo "PYPI_API_TOKEN is not configured."
            echo "Skip token fallback publish and let the failure handler decide next step."
            exit 1
          fi
          python -m twine upload --non-interactive dist/*

      - name: Publish to PyPI (failed)
        if: ${{ (github.event_name == 'push' || github.event.inputs.publish == 'true') && steps.publish_trusted.outcome != 'success' && steps.publish_api.outcome != 'success' }}
        run: |
          echo "PyPI publish failed and fallback credentials are not configured."
          echo "Set PYPI_API_TOKEN in repository secrets, or configure trusted publishing in PyPI."
          exit 1

      - name: Publish release assets
        if: |
          ${{
            (github.event_name == 'push' || github.event.inputs.publish == 'true') &&
            (steps.publish_trusted.outcome == 'success' || steps.publish_api.outcome == 'success')
          }}
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
